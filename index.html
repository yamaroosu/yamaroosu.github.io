<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Browser League</title>
    <style>
        body {
            margin: 0;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        h1 { margin-top: 20px; margin-bottom: 5px; }
        #scoreboard {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 15px;
            background: rgba(0,0,0,0.3);
            padding: 10px 30px;
            border-radius: 10px;
        }
        .blue-score { color: #3498db; }
        .red-score { color: #e74c3c; }
        canvas {
            background-color: #27ae60; /* Rasenfarbe */
            border: 4px solid #ecf0f1;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border-radius: 10px;
        }
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 40px;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <h1>🚀 Browser League 🚗</h1>
    <div id="scoreboard">
        <span class="blue-score" id="score1">0</span> - <span class="red-score" id="score2">0</span>
    </div>
    
    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <div class="controls">
        <div><strong>Spieler 1 (Blau):</strong><br>W = Gas<br>S = Bremse/Rückwärts<br>A / D = Lenken</div>
        <div><strong>Spieler 2 (Rot):</strong><br>Aufwärts = Gas<br>Abwärts = Bremse<br>Links / Rechts = Lenken</div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Spiel-Status
        let scoreBlue = 0;
        let scoreRed = 0;
        const keys = {};

        // Event Listener für Tastatur
        window.addEventListener("keydown", (e) => keys[e.key] = true);
        window.addEventListener("keyup", (e) => keys[e.key] = false);

        // Klassen-Definitionen
        class Entity {
            constructor(x, y, radius, color) {
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.radius = radius;
                this.color = color;
                this.friction = 0.98;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.closePath();
            }

            update() {
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.x += this.vx;
                this.y += this.vy;

                // Wand-Kollision (Banden)
                if (this.x - this.radius < 0) { this.x = this.radius; this.vx *= -0.8; }
                if (this.x + this.radius > canvas.width) { this.x = canvas.width - this.radius; this.vx *= -0.8; }
                
                // Tore sind an den Seitenmitte (y zwischen 150 und 350)
                if (this.y - this.radius < 0) { this.y = this.radius; this.vy *= -0.8; }
                if (this.y + this.radius > canvas.height) { this.y = canvas.height - this.radius; this.vy *= -0.8; }
            }
        }

        class Car extends Entity {
            constructor(x, y, color) {
                super(x, y, 20, color);
                this.angle = 0;
                this.speed = 0.5;
                this.turnSpeed = 0.08;
                this.friction = 0.94; // Autos bremsen schneller ab als der Ball
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                // Auto-Körper
                ctx.fillStyle = this.color;
                ctx.fillRect(-20, -15, 40, 30);
                
                // Windschutzscheibe (um die Richtung zu sehen)
                ctx.fillStyle = "#fff";
                ctx.fillRect(5, -10, 10, 20);
                
                ctx.restore();
            }

            accelerate(dir) {
                this.vx += Math.cos(this.angle) * this.speed * dir;
                this.vy += Math.sin(this.angle) * this.speed * dir;
            }
        }

        // Instanzen erstellen
        let p1 = new Car(100, 250, "#3498db");
        let p2 = new Car(700, 250, "#e74c3c");
        p2.angle = Math.PI; // Rotes Auto schaut nach links
        let ball = new Entity(400, 250, 15, "#ecf0f1");
        ball.friction = 0.99; // Ball rollt länger

        // Kollisions-Logik (Kreise)
        function checkCollision(obj1, obj2) {
            let dx = obj1.x - obj2.x;
            let dy = obj1.y - obj2.y;
            let dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist < obj1.radius + obj2.radius) {
                // Trennen, damit sie nicht stecken bleiben
                let overlap = (obj1.radius + obj2.radius) - dist;
                let nx = dx / dist;
                let ny = dy / dist;
                
                obj1.x += nx * overlap / 2;
                obj1.y += ny * overlap / 2;
                obj2.x -= nx * overlap / 2;
                obj2.y -= ny * overlap / 2;

                // Impulse austauschen
                let kx = (obj1.vx - obj2.vx);
                let ky = (obj1.vy - obj2.vy);
                let p = 2 * (nx * kx + ny * ky) / 2;
                
                obj1.vx -= p * nx;
                obj1.vy -= p * ny;
                obj2.vx += p * nx;
                obj2.vy += p * ny;
                
                // Wenn Auto auf Ball trifft, etwas mehr Wucht geben
                if (obj1 === ball || obj2 === ball) {
                    ball.vx *= 1.2;
                    ball.vy *= 1.2;
                }
            }
        }

        function resetPositions() {
            p1.x = 100; p1.y = 250; p1.vx = 0; p1.vy = 0; p1.angle = 0;
            p2.x = 700; p2.y = 250; p2.vx = 0; p2.vy = 0; p2.angle = Math.PI;
            ball.x = 400; ball.y = 250; ball.vx = 0; ball.vy = 0;
        }

        function drawGoals() {
            ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
            // Linkes Tor (Rot punktet)
            ctx.fillRect(0, 150, 20, 200);
            // Rechtes Tor (Blau punktet)
            ctx.fillRect(780, 150, 20, 200);
        }

        // Haupt-Game-Loop
        function gameLoop() {
            // Hintergrund zeichnen
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGoals();

            // Steuerung Spieler 1 (W,A,S,D)
            if (keys["w"] || keys["W"]) p1.accelerate(1);
            if (keys["s"] || keys["S"]) p1.accelerate(-0.5);
            if (keys["a"] || keys["A"]) p1.angle -= p1.turnSpeed;
            if (keys["d"] || keys["D"]) p1.angle += p1.turnSpeed;

            // Steuerung Spieler 2 (Pfeiltasten)
            if (keys["ArrowUp"]) p2.accelerate(1);
            if (keys["ArrowDown"]) p2.accelerate(-0.5);
            if (keys["ArrowLeft"]) p2.angle -= p2.turnSpeed;
            if (keys["ArrowRight"]) p2.angle += p2.turnSpeed;

            // Physik Updates
            p1.update();
            p2.update();
            ball.update();

            // Kollisionen prüfen
            checkCollision(p1, p2);
            checkCollision(p1, ball);
            checkCollision(p2, ball);

            // Tor-Logik prüfen
            if (ball.x - ball.radius < 20 && ball.y > 150 && ball.y < 350) {
                scoreRed++;
                document.getElementById("score2").innerText = scoreRed;
                resetPositions();
            } else if (ball.x + ball.radius > 780 && ball.y > 150 && ball.y < 350) {
                scoreBlue++;
                document.getElementById("score1").innerText = scoreBlue;
                resetPositions();
            }

            // Zeichnen
            p1.draw();
            p2.draw();
            ball.draw();

            requestAnimationFrame(gameLoop);
        }

        // Spiel starten
        gameLoop();
    </script>
</body>
</html>
