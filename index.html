<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Browser League</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        body {
            margin: 0; background-color: #2c3e50; color: white;
            display: flex; flex-direction: column; align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }
        h1 { margin-top: 20px; margin-bottom: 5px; }
        #scoreboard {
            font-size: 3rem; font-weight: bold; margin-bottom: 15px;
            background: rgba(0,0,0,0.3); padding: 10px 30px; border-radius: 10px;
        }
        .blue-score { color: #3498db; }
        .red-score { color: #e74c3c; }
        #gameContainer { position: relative; }
        canvas {
            background-color: #27ae60; border: 4px solid #ecf0f1;
            box-shadow: 0 0 20px rgba(0,0,0,0.5); border-radius: 10px;
            display: none; /* Erst zeigen, wenn verbunden */
        }
        #menu {
            position: absolute; top: 0; left: 0; width: 800px; height: 500px;
            background: #2c3e50; border: 4px solid #ecf0f1; border-radius: 10px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 20px; z-index: 10;
        }
        button {
            padding: 15px 30px; font-size: 1.2rem; cursor: pointer;
            background: #f39c12; color: white; border: none; border-radius: 5px;
        }
        button:hover { background: #e67e22; }
        input { padding: 10px; font-size: 1.2rem; text-align: center; width: 250px;}
        .info-box { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; text-align: center;}
    </style>
</head>
<body>

    <h1>🚀 P2P Browser League 🚗</h1>
    <div id="scoreboard">
        <span class="blue-score" id="score1">0</span> - <span class="red-score" id="score2">0</span>
    </div>
    
    <div id="gameContainer">
        <div id="menu">
            <h2>Multiplayer Setup</h2>
            <div class="info-box">
                <p>Status: <span id="peerStatus" style="color:#f1c40f;">Verbinde mit PeerJS Server...</span></p>
            </div>
            
            <div style="display: flex; gap: 50px; margin-top: 20px;">
                <div class="info-box" style="border: 2px solid #3498db;">
                    <h3>Spiel Erstellen (Blau)</h3>
                    <p>Deine ID:<br><strong id="myIdDisplay" style="font-size: 1.5rem; user-select: all;">...</strong></p>
                    <p style="font-size: 0.9em; color: #ccc;">Schicke diese ID an deinen Freund.</p>
                </div>

                <div class="info-box" style="border: 2px solid #e74c3c;">
                    <h3>Spiel Beitreten (Rot)</h3>
                    <input type="text" id="joinIdInput" placeholder="ID des Hosts einfügen">
                    <br><br>
                    <button id="btnJoin">Verbinden</button>
                </div>
            </div>
        </div>

        <canvas id="gameCanvas" width="800" height="500"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const menu = document.getElementById("menu");
        
        // Multiplayer Variablen
        let peer = null;
        let conn = null;
        let isHost = false;
        let gameActive = false;
        
        // Tasten
        const keys = {};
        let clientKeys = {}; // Speichert die Tasten des Gegners

        window.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);

        // --- PeerJS Setup ---
        peer = new Peer(); // Erstellt eine zufällige ID beim PeerJS Server

        peer.on('open', function(id) {
            document.getElementById('peerStatus').innerText = "Bereit!";
            document.getElementById('peerStatus').style.color = "#2ecc71";
            document.getElementById('myIdDisplay').innerText = id;
        });

        // Wenn jemand versucht, sich mit uns (dem Host) zu verbinden
        peer.on('connection', function(connection) {
            conn = connection;
            isHost = true;
            setupConnection();
        });

        // Wenn wir (als Client) auf "Verbinden" klicken
        document.getElementById('btnJoin').addEventListener('click', () => {
            const hostId = document.getElementById('joinIdInput').value;
            if(!hostId) return alert("Bitte eine ID eingeben!");
            
            document.getElementById('btnJoin').innerText = "Verbinde...";
            conn = peer.connect(hostId);
            isHost = false;
            setupConnection();
        });

        function setupConnection() {
            conn.on('open', () => {
                // Verbindung steht!
                menu.style.display = "none";
                canvas.style.display = "block";
                gameActive = true;
                
                // Wir schicken uns gegenseitig Daten
                conn.on('data', (data) => {
                    if (isHost) {
                        // Host empfängt die Tastendrücke vom Client
                        clientKeys = data;
                    } else {
                        // Client empfängt die exakten Positionen vom Host
                        updateStateFromHost(data);
                    }
                });

                if (isHost) gameLoopHost();
                if (!isHost) gameLoopClient();
            });
        }

        // --- Spiel Logik & Klassen ---
        let scoreBlue = 0; let scoreRed = 0;

        class Entity {
            constructor(x, y, radius, color) {
                this.x = x; this.y = y; this.vx = 0; this.vy = 0;
                this.radius = radius; this.color = color; this.friction = 0.98;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill(); ctx.closePath();
            }
            update() {
                this.vx *= this.friction; this.vy *= this.friction;
                this.x += this.vx; this.y += this.vy;
                if (this.x - this.radius < 0) { this.x = this.radius; this.vx *= -0.8; }
                if (this.x + this.radius > canvas.width) { this.x = canvas.width - this.radius; this.vx *= -0.8; }
                if (this.y - this.radius < 0) { this.y = this.radius; this.vy *= -0.8; }
                if (this.y + this.radius > canvas.height) { this.y = canvas.height - this.radius; this.vy *= -0.8; }
            }
        }

        class Car extends Entity {
            constructor(x, y, color) {
                super(x, y, 20, color);
                this.angle = 0; this.speed = 0.5; this.turnSpeed = 0.08; this.friction = 0.94;
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
                ctx.fillStyle = this.color; ctx.fillRect(-20, -15, 40, 30);
                ctx.fillStyle = "#fff"; ctx.fillRect(5, -10, 10, 20);
                ctx.restore();
            }
            accelerate(dir) {
                this.vx += Math.cos(this.angle) * this.speed * dir;
                this.vy += Math.sin(this.angle) * this.speed * dir;
            }
        }

        let p1 = new Car(100, 250, "#3498db"); // Host (Blau)
        let p2 = new Car(700, 250, "#e74c3c"); // Client (Rot)
        p2.angle = Math.PI;
        let ball = new Entity(400, 250, 15, "#ecf0f1");
        ball.friction = 0.99;

        function checkCollision(obj1, obj2) {
            let dx = obj1.x - obj2.x; let dy = obj1.y - obj2.y;
            let dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < obj1.radius + obj2.radius) {
                let overlap = (obj1.radius + obj2.radius) - dist;
                let nx = dx / dist; let ny = dy / dist;
                obj1.x += nx * overlap / 2; obj1.y += ny * overlap / 2;
                obj2.x -= nx * overlap / 2; obj2.y -= ny * overlap / 2;
                let kx = (obj1.vx - obj2.vx); let ky = (obj1.vy - obj2.vy);
                let p = 2 * (nx * kx + ny * ky) / 2;
                obj1.vx -= p * nx; obj1.vy -= p * ny;
                obj2.vx += p * nx; obj2.vy += p * ny;
                if (obj1 === ball || obj2 === ball) { ball.vx *= 1.2; ball.vy *= 1.2; }
            }
        }

        function resetPositions() {
            p1.x = 100; p1.y = 250; p1.vx = 0; p1.vy = 0; p1.angle = 0;
            p2.x = 700; p2.y = 250; p2.vx = 0; p2.vy = 0; p2.angle = Math.PI;
            ball.x = 400; ball.y = 250; ball.vx = 0; ball.vy = 0;
        }

        function drawWorld() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
            ctx.fillRect(0, 150, 20, 200); // Tor Rot
            ctx.fillRect(780, 150, 20, 200); // Tor Blau
            p1.draw(); p2.draw(); ball.draw();
            document.getElementById("score1").innerText = scoreBlue;
            document.getElementById("score2").innerText = scoreRed;
        }

        // --- Host Loop (Berechnet alles) ---
        function gameLoopHost() {
            if (!gameActive) return;

            // Host steuert p1 (Blau)
            if (keys["w"] || keys["arrowup"]) p1.accelerate(1);
            if (keys["s"] || keys["arrowdown"]) p1.accelerate(-0.5);
            if (keys["a"] || keys["arrowleft"]) p1.angle -= p1.turnSpeed;
            if (keys["d"] || keys["arrowright"]) p1.angle += p1.turnSpeed;

            // Client steuert p2 (Rot) via Netzwerk-Daten
            if (clientKeys["w"] || clientKeys["arrowup"]) p2.accelerate(1);
            if (clientKeys["s"] || clientKeys["arrowdown"]) p2.accelerate(-0.5);
            if (clientKeys["a"] || clientKeys["arrowleft"]) p2.angle -= p2.turnSpeed;
            if (clientKeys["d"] || clientKeys["arrowright"]) p2.angle += p2.turnSpeed;

            p1.update(); p2.update(); ball.update();
            checkCollision(p1, p2); checkCollision(p1, ball); checkCollision(p2, ball);

            // Tore
            if (ball.x - ball.radius < 20 && ball.y > 150 && ball.y < 350) { scoreRed++; resetPositions(); }
            else if (ball.x + ball.radius > 780 && ball.y > 150 && ball.y < 350) { scoreBlue++; resetPositions(); }

            drawWorld();

            // Status an Client senden
            conn.send({
                p1: {x: p1.x, y: p1.y, a: p1.angle},
                p2: {x: p2.x, y: p2.y, a: p2.angle},
                ball: {x: ball.x, y: ball.y},
                score: {b: scoreBlue, r: scoreRed}
            });

            requestAnimationFrame(gameLoopHost);
        }

        // --- Client Loop (Zeichnet nur und sendet Tasten) ---
        function updateStateFromHost(state) {
            p1.x = state.p1.x; p1.y = state.p1.y; p1.angle = state.p1.a;
            p2.x = state.p2.x; p2.y = state.p2.y; p2.angle = state.p2.a;
            ball.x = state.ball.x; ball.y = state.ball.y;
            scoreBlue = state.score.b; scoreRed = state.score.r;
        }

        function gameLoopClient() {
            if (!gameActive) return;
            
            drawWorld(); // Zeichnet den vom Host empfangenen Zustand
            conn.send(keys); // Schickt eigene Tastendrücke an Host

            requestAnimationFrame(gameLoopClient);
        }
    </script>
</body>
</html>
